version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: social_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: social_app
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: social_backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    depends_on:
      - mysql
    volumes:
      - ./backend/uploads:/app/uploads
    expose:
      - "5000"

  my_social:
    build: ./my_social
    container_name: social_frontend
    depends_on:
      - backend
    expose:
      - "80"

  admin:
    build: ./admin
    container_name: social_admin
    depends_on:
      - backend
    expose:
      - "80"

  nginx:
    image: nginx:alpine
    container_name: social_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - my_social
      - admin
      - backend

volumes:
  mysql_data: